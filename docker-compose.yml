# Docker Compose for Table Tennis Referee API
# Optimized for Vultr VM deployment

services:
  api:
    build: .
    container_name: table-tennis-referee-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
